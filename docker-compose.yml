services:
  # Institutional School Database (MySQL)
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: face_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Redis for Celery
  redis:
    image: redis:7.0-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6380:6379"

  # Evolution API Database (Postgres)
  evolution_db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_password
      POSTGRES_DB: evolution_api
    volumes:
      - evolution_db_v2:/var/lib/postgresql/data # New volume name to force a clean slate

  # Evolution API Gateway
  evolution_api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: always
    environment:
      - SERVER_URL=http://localhost:8085
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=admin123
      # CORRECT v2.1.1 CACHE CONFIG
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      # Database Config
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_password@evolution_db:5432/evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
    ports:
      - "8085:8080"
    depends_on:
      - evolution_db

volumes:
  mysql_data:
  evolution_db_v2: # Force a clean start